<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💗 Heart Bubbles</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe6f0 0%, #fff0f8 50%, #fce4ec 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      font-family: 'Georgia', serif;
    }

    /* 배경 보케 효과 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,182,193,0.35) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,105,180,0.2) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255,228,240,0.4) 0%, transparent 60%);
      pointer-events: none;
    }

.image-container {
  position: fixed;   /* relative → fixed */
  inset: 0;          /* 추가: 상하좌우 0 */
  width: 100vw;      /* 추가 */
  height: 100vh;     /* 추가 */
  border-radius: 0;  /* 24px → 0 */
  box-shadow: none;  /* 제거 */
}

    .image-container img {
  width: 100%;
  height: 100%;
  max-width: none;   /* 기존 max-width 제거 */
  max-height: none;  /* 기존 max-height 제거 */
  object-fit: cover; /* contain → cover (여백 없이 꽉 채움) */
  border-radius: 0;
}

    /* 클릭 힌트 */
    .hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200, 80, 120, 0.7);
      font-size: 14px;
      letter-spacing: 0.08em;
      animation: hintPulse 2.5s ease-in-out infinite;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    }

    /* ── 하트 버블 ── */
    .heart-bubble {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      animation: floatUp var(--duration) ease-out forwards;
      font-size: var(--size);
      transform-origin: center;
      filter: drop-shadow(0 2px 6px rgba(255, 80, 130, 0.4));
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translate(0, 0) scale(0.3) rotate(var(--rot-start));
      }
      15% {
        opacity: 1;
        transform: translate(var(--dx-early), -40px) scale(1.1) rotate(calc(var(--rot-start) * 0.5));
      }
      60% {
        opacity: 0.85;
        transform: translate(var(--dx-mid), -160px) scale(1) rotate(var(--rot-mid));
      }
      85% {
        opacity: 0.4;
        transform: translate(var(--dx-late), -280px) scale(0.9) rotate(var(--rot-end));
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx-final), -380px) scale(0.5) rotate(var(--rot-end));
      }
    }
  </style>
</head>
<body>

  <div class="image-container" id="imgWrap">
    <img src="image.png" alt="이미지" id="mainImg" />
  </div>


  <script>
    const HEART_CHARS = ['❤️', '🩷', '💕', '💖', '💗', '💓', '💝', '💞'];

    function rnd(min, max) {
      return Math.random() * (max - min) + min;
    }

    function spawnHeart(x, y) {
      const el = document.createElement('span');
      el.className = 'heart-bubble';
      el.textContent = HEART_CHARS[Math.floor(Math.random() * HEART_CHARS.length)];

      const size   = rnd(22, 52);
      const dur    = rnd(1.8, 3.2);
      const dxEarly = rnd(-30, 30);
      const dxMid   = rnd(-60, 60);
      const dxLate  = rnd(-90, 90);
      const dxFinal = rnd(-120, 120);
      const rotS    = rnd(-30, 30);
      const rotM    = rnd(-15, 15);
      const rotE    = rnd(-40, 40);

      el.style.cssText = `
        left: ${x}px;
        top: ${y}px;
        --size: ${size}px;
        --duration: ${dur}s;
        --dx-early: ${dxEarly}px;
        --dx-mid: ${dxMid}px;
        --dx-late: ${dxLate}px;
        --dx-final: ${dxFinal}px;
        --rot-start: ${rotS}deg;
        --rot-mid: ${rotM}deg;
        --rot-end: ${rotE}deg;
        margin-left: -${size/2}px;
        margin-top: -${size/2}px;
      `;

      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    document.addEventListener('click', (e) => {
      const count = Math.floor(rnd(5, 11));
      for (let i = 0; i < count; i++) {
        // 살짝 흩어진 위치에서 동시 분출
        const ox = rnd(-20, 20);
        const oy = rnd(-20, 20);
        setTimeout(() => spawnHeart(e.clientX + ox, e.clientY + oy), i * 40);
      }
    });
  </script>
</body>
</html>
